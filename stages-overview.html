<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Route Directory | Rack Raid Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="site-layout.js"></script>
    <style>
        .scenic-gradient-overlay {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.65) 0%, rgba(15, 23, 42, 0.9) 100%);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div class="w-full bg-slate-900 border-b border-slate-800">
        <header id="global-header" class="text-white"></header>
    </div>

    <div class="w-full bg-slate-950 h-[320px] relative overflow-hidden flex items-center border-b border-slate-800">
        <img src="assets/images/banners/default_stage.jpg" class="absolute inset-0 w-full h-full object-cover opacity-35 mix-blend-luminosity brightness-75" alt="Archive background">
        <div class="absolute inset-0 scenic-gradient-overlay"></div>
        
        <div class="max-w-[1400px] mx-auto w-full px-4 relative z-10 flex flex-col justify-center">
            <h2 class="text-white font-black text-4xl md:text-5xl uppercase tracking-tight leading-none mb-3">The 14 Stages</h2>
            <p class="text-slate-300 font-medium text-sm md:text-base max-w-2xl leading-relaxed m-0">
                Explore individual maps, multi-terrain route profile descriptions, elevation challenges, and legacy course records spanning across the entire traditional relay circuit.
            </p>
        </div>
    </div>

    <div class="page-wrapper flex-grow !pt-8">
        <div class="max-w-[1400px] mx-auto w-full px-4">
            
            <div id="stagesGridContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                </div>

        </div>
    </div>

    <footer id="global-footer" class="bg-slate-900 text-slate-400 text-xs py-6 border-t border-slate-800"></footer>

    <script src="stages.js"></script>
    <script src="results_2026.js"></script>
    <script>
        // Master Lookup for Stage Names
        const stageNames = {
            1: "Grosmont to Skenfrith",
            2: "Skenfrith to White Castle",
            3: "White Castle to Abergavenny",
            4: "Abergavenny to Old Court Moat",
            5: "Old Court Moat to Monmouth",
            6: "Monmouth to Raglan",
            7: "Raglan to Usk",
            8: "Usk to Tintern",
            9: "Tintern to Chepstow",
            10: "Chepstow to Caldicot",
            11: "Caldicot to Penhow",
            12: "Penhow to Caerleon",
            13: "Caerleon to Castell-y-Bwch",
            14: "Castell-y-Bwch to Olive Tree"
        };

        function cleanLabel(str) {
            return str ? str.replace(/\s*\([^)]+\)/g, '').trim() : '';
        }

        document.addEventListener("DOMContentLoaded", function() {
            const grid = document.getElementById('stagesGridContainer');
            if (!grid || typeof stageProfiles === 'undefined') return;

            let htmlBuffer = '';

            // Run automated parsing loop sequentially across all 14 stages
            for (let i = 1; i <= 14; i++) {
                const profile = stageProfiles[i];
                if (!profile) continue;

                const trueLocation = stageNames[i] || `Route Segment ${i}`;
                
                // Scan single-year array database pool to calculate stage champion benchmarks
                const stageHistory = typeof results2026 !== 'undefined' ? results2026.filter(r => r.stage === i) : [];
                stageHistory.sort((a, b) => a.time.localeCompare(b.time));

                let recordTime = '--:--:--';
                let recordHolder = 'No record established yet';

                if (stageHistory.length > 0) {
                    recordTime = stageHistory[0].time;
                    recordHolder = `${cleanLabel(stageHistory[0].name)} (${cleanLabel(stageHistory[0].club)})`;
                }

                htmlBuffer += `
                    <a href="stage.html?stage=${i}" class="group block bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden hover:shadow-md hover:border-slate-300 transition-all text-slate-900 no-underline">
                        <div class="h-[140px] bg-slate-900 relative overflow-hidden flex items-end p-4 border-b border-slate-100">
                            <img src="assets/images/banners/stage_${i}.jpg" class="absolute inset-0 w-full h-full object-cover opacity-25 group-hover:scale-105 transition-transform duration-300 mix-blend-luminosity brightness-90" onerror="this.src='assets/images/banners/default_stage.jpg'; this.onerror=null;" alt="Stage background">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-slate-900/40 to-transparent"></div>
                            
                            <div class="relative z-10">
                                <span class="text-xs font-bold uppercase tracking-wider text-emerald-400 block mb-0.5">Stage ${i}</span>
                                <h3 class="text-white font-black text-lg uppercase tracking-tight m-0 leading-tight">${trueLocation}</h3>
                            </div>
                        </div>

                        <div class="p-4 flex flex-col gap-4">
                            <div class="flex gap-4 text-xs font-bold text-slate-500 uppercase tracking-wider">
                                <div><span class="text-slate-800 font-black text-sm">${profile.distanceMiles}</span> mi</div>
                                <div class="border-l border-slate-200 pl-4"><span class="text-slate-800 font-black text-sm">${profile.elevationGainMetres}</span>m Climb</div>
                                <div class="border-l border-slate-200 pl-4">Toughness: <span class="text-amber-500 font-black text-sm">${profile.toughness}</span>/5</div>
                            </div>

                            <div class="bg-slate-50 rounded-lg p-3 border border-slate-100 flex items-center justify-between gap-4">
                                <div class="truncate">
                                    <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-0.5">Course Record</span>
                                    <span class="text-xs font-semibold text-slate-700 truncate block">${recordHolder}</span>
                                </div>
                                <div class="bg-emerald-50 text-emerald-700 font-mono font-bold text-xs px-2.5 py-1 rounded-md tracking-tight border border-emerald-100 shrink-0">
                                    ${recordTime}
                                </div>
                            </div>
                        </div>
                    </a>`;
            }

            grid.innerHTML = htmlBuffer;
        });
    </script>
</body>
</html>
