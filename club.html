<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Profile - Rack Raid Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="site-layout.js"></script>
    <style>
        /* Keep page-specific presentation components intact */
        .club-hero-panel {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 35px;
            margin-bottom: 35px;
            border-left-width: 6px;
        }
        .club-hero-panel h1 {
            margin: 0 0 10px 0;
            font-size: 3rem;
            font-weight: 800;
            color: #111827;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }
        .club-meta-summary {
            font-size: 1.1rem;
            color: #4b5563;
            margin: 0;
            font-weight: 500;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .stat-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 24px 20px;
            text-align: center;
            transition: border-color 0.15s ease;
        }
        .stat-card:hover {
            border-color: #d1d5db;
        }
        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #111827;
            margin-bottom: 3px;
            letter-spacing: -0.5px;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dashboard-section {
            margin-bottom: 45px;
        }
        .dashboard-section h2 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #111827;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 8px;
        }
        .leaderboard-table {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            border-collapse: collapse;
        }
        .leaderboard-header {
            display: grid;
            grid-template-columns: 10% 45% 45%;
            background-color: #f8f9fa;
            font-weight: 600;
            color: #4b5563;
            border-bottom: 2px solid #e5e7eb;
            padding: 12px 16px;
        }
        .leaderboard-row {
            display: grid;
            grid-template-columns: 10% 45% 45%;
            padding: 14px 16px;
            border-bottom: 1px solid #f3f4f6;
            align-items: center;
        }
        .leaderboard-row:last-child {
            border-bottom: none;
        }
        .leaderboard-row:nth-child(even) {
            background-color: #fcfcfc;
        }
        .leaderboard-row a {
            color: #111827;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed transparent;
        }
        .leaderboard-row a:hover {
            border-bottom-color: #111827;
        }
        .completion-grid {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            vertical-align: middle;
        }
        .stage-box {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            background-color: #e5e7eb;
            color: #9ca3af;
            user-select: none;
        }
        .stage-box.completed {
            background-color: #16a34a !important;
            color: #ffffff !important;
        }
        .win-history-tag {
            font-size: 0.85rem;
            color: #4b5563;
            font-weight: 500;
            background-color: #f3f4f6;
            padding: 3px 10px;
            border-radius: 12px;
            margin-left: 6px;
            display: inline-block;
        }
        .text-right { text-align: right; }
        .font-bold { font-weight: 700; }

        @media screen and (max-width: 640px) {
            .leaderboard-header { display: none; }
            .leaderboard-row { grid-template-columns: max-content 1fr; gap: 8px; padding: 12px; }
            .leaderboard-row div:nth-child(1) { font-weight: 700; color: #6b7280; }
            .leaderboard-row div:nth-child(3) { grid-column: 1 / span 2; font-size: 0.9rem; padding-top: 4px; text-align: left !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div class="w-full bg-slate-900 border-b border-slate-800">
        <header id="global-header" class="text-white"></header>
    </div>

    <div class="page-wrapper flex-grow !pt-6">
        <div class="max-w-[1400px] mx-auto w-full px-4">

            <a href="index.html" onclick="window.history.back(); return false;" class="inline-flex items-center gap-1.5 text-slate-400 hover:text-slate-900 font-semibold no-underline mb-6 transition-colors text-sm">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Results Archive
            </a>

            <main class="main-profile-container">
                
                <div id="clubHeroPanel" class="club-hero-panel">
                    <h1 id="clubName">-</h1>
                    <p id="clubMeta" class="club-meta-summary">Calculating club archive footprint...</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div id="statTotalRaces" class="stat-value">0</div>
                        <div class="stat-label">Total Finishers</div>
                    </div>
                    <div class="stat-card">
                        <div id="statUniqueRunners" class="stat-value">0</div>
                        <div class="stat-label">Unique Athletes</div>
                    </div>
                    <div class="stat-card">
                        <div id="statClubWins" class="stat-value">0</div>
                        <div class="stat-label">Stage Victories</div>
                    </div>
                    <div class="stat-card">
                        <div id="statClubPodiums" class="stat-value">0</div>
                        <div class="stat-label">Podium Finishes</div>
                    </div>
                </div>

                <div class="dashboard-section">
                    <h2>Loyalty Leaderboard (Most Stages Run)</h2>
                    <div class="leaderboard-table">
                        <div class="leaderboard-header">
                            <div>Rank</div>
                            <div>Athlete Name</div>
                            <div>Stages Run & Completion Matrix (1-14)</div>
                        </div>
                        <div id="loyaltyContainer"></div>
                    </div>
                </div>

                <div class="dashboard-section">
                    <h2>Stage Winners Circle</h2>
                    <div class="leaderboard-table">
                        <div class="leaderboard-header">
                            <div>Rank</div>
                            <div>Athlete Name</div>
                            <div class="text-right">Stage Wins Breakdown</div>
                        </div>
                        <div id="winnersContainer"></div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <footer id="global-footer" class="bg-slate-900 text-slate-400 text-xs py-6 border-t border-slate-800"></footer>

    <script src="data.js"></script>
    <script>
        const clubColorsMaster = {
            "aberdare": { text: "#F49931", bg: "#000400", border: "rgba(244, 153, 49, 0.3)" },
            "albany road": { text: "#000000", bg: "#FB24A3", border: "rgba(0, 0, 0, 0.2)" },
            "brackla harriers": { text: "#FFBA36", bg: "#FF0005", border: "rgba(255, 186, 54, 0.3)" },
            "builth & district rc": { text: "#000000", bg: "#FCFA3A", border: "rgba(0, 0, 0, 0.2)" },
            "caerleon rc": { text: "#000000", bg: "#4C1B60", border: "rgba(0, 0, 0, 0.2)" },
            "caerphilly runners": { text: "#000000", bg: "#5A98DD", border: "rgba(0, 0, 0, 0.2)" },
            "caldicot rc": { text: "#ffffff", bg: "#040503", border: "rgba(255, 255, 255, 0.3)" },
            "cdf runners": { text: "#ffffff", bg: "#292221", border: "rgba(255, 255, 255, 0.3)" },
            "chepstow harriers": { text: "#C4B605", bg: "#5A9BD4", border: "rgba(196, 182, 5, 0.4)" },
            "cornelly striders": { text: "#B96F01", bg: "#FFED00", border: "rgba(185, 111, 1, 0.4)" },
            "fairwater runners": { text: "#142241", bg: "#8EB1EA", border: "rgba(20, 34, 65, 0.3)" },
            "griffithstown harriers": { text: "#ffffff", bg: "#05683B", border: "rgba(255, 255, 255, 0.3)" },
            "islwyn rc": { text: "#ffffff", bg: "#040002", border: "rgba(255, 255, 255, 0.3)" },
            "les croupiers rc": { text: "#ffffff", bg: "#01B240", border: "rgba(255, 255, 255, 0.3)" },
            "lliswerry runners": { text: "#ffffff", bg: "#AB0851", border: "rgba(255, 255, 255, 0.3)" },
            "monross trailblazers": { text: "#ffffff", bg: "#B36927", border: "rgba(255, 255, 255, 0.3)" },
            "neath harriers": { text: "#ffffff", bg: "#000000", border: "rgba(255, 255, 255, 0.3)" },
            "ogmore phoenix runners": { text: "#ffffff", bg: "#B36927", border: "rgba(255, 255, 255, 0.3)" },
            "parc bryn bach rc": { text: "#978430", bg: "#03632A", border: "rgba(151, 132, 48, 0.4)" },
            "pont-y-pwl & district runners": { text: "#ffffff", bg: "#E41F4C", border: "rgba(255, 255, 255, 0.3)" },
            "pontyclun road runners": { text: "#E4CC60", bg: "#5C67A0", border: "rgba(228, 204, 96, 0.4)" },
            "pontypridd roadents": { text: "#ffffff", bg: "#000000", border: "rgba(255, 255, 255, 0.3)" },
            "porthcawl runers": { text: "#ffffff", bg: "#000000", border: "rgba(255, 255, 255, 0.3)" },
            "rhondda valley runners": { text: "#ffffff", bg: "#C3121F", border: "rgba(255, 255, 255, 0.3)" },
            "san domenico rc": { text: "#E32335", bg: "#100D1A", border: "rgba(227, 35, 53, 0.3)" },
            "spirit of monmouth": { text: "#C8B506", bg: "#034CAD", border: "rgba(200, 181, 6, 0.4)" },
            "independent": { text: "#4b5563", bg: "#f3f4f6", border: "#e5e7eb" }
        };

        const cleanClubName = (rawString) => {
            if (!rawString) return "Independent";
            let val = rawString.toString().trim();
            val = val.replace(/\s*\(\d+\)\s*$/, '').trim();
            let matchKey = val.toLowerCase();
            
            if (matchKey.includes('chepstow')) return 'Chepstow Harriers';
            if (matchKey.includes('parc')) return 'Parc Bryn Bach RC';
            if (matchKey.includes('pont-y-pwl') || matchKey.includes('pontypool')) return 'Pont-y-pwl & District Runners';
            if (matchKey.includes('liswerry') || matchKey.includes('lliswerry')) return 'Lliswerry Runners';
            if (matchKey.includes('caerleon')) return 'Caerleon RC';
            if (matchKey.includes('caerphilly')) return 'Caerphilly Runners';
            if (matchKey.includes('caldicot')) return 'Caldicot RC';
            if (matchKey.includes('cdf')) return 'CDF Runners';
            if (matchKey.includes('griffithstown')) return 'Griffithstown Harriers';
            if (matchKey.includes('islwyn')) return 'Islwyn RC';
            if (matchKey.includes('les croupiers') || matchKey.includes('croupiers')) return 'Les Croupiers RC';
            if (matchKey.includes('monross')) return 'Monross Trailblazers';
            if (matchKey.includes('neath')) return 'Neath Harriers';
            if (matchKey.includes('ogmore')) return 'Ogmore Phoenix Runners';
            if (matchKey.includes('pontyclun')) return 'Pontyclun Road Runners';
            if (matchKey.includes('pontypridd')) return 'Pontypridd Roadents';
            if (matchKey.includes('porthcawl')) return 'Porthcawl Runers';
            if (matchKey.includes('rhondda')) return 'Rhondda Valley Runners';
            if (matchKey.includes('san domenico')) return 'San Domenico RC';
            if (matchKey.includes('aberdare')) return 'Aberdare';
            if (matchKey.includes('albany')) return 'Albany Road';
            if (matchKey.includes('brackla')) return 'Brackla Harriers';
            if (matchKey.includes('builth')) return 'Builth & District RC';
            if (matchKey.includes('cornelly')) return 'Cornelly Striders';
            if (matchKey.includes('fairwater') || matchKey.includes('fiarwater')) return 'Fairwater Runners';
            if (matchKey.includes('monmouth') || matchKey.includes('spirit')) return 'Spirit of Monmouth';

            if (val === '-' || matchKey === 'individual' || matchKey === 'unattached') return 'Independent';
            return val;
        };

        const urlParams = new URLSearchParams(window.location.search);
        const targetClub = urlParams.get('club');

        if (targetClub) {
            const formalClubName = cleanClubName(targetClub);
            document.title = `${formalClubName} - Club Profile`;
            document.getElementById('clubName').textContent = formalClubName;

            const clubKey = formalClubName.toLowerCase().trim();
            const panel = document.getElementById('clubHeroPanel');
            let activeColor = "#111827";

            if (clubColorsMaster[clubKey]) {
                const borderAccent = clubColorsMaster[clubKey].bg;
                panel.style.borderLeftColor = (borderAccent === '#ffffff') ? '#111827' : borderAccent;
                activeColor = clubColorsMaster[clubKey].text;
            } else {
                panel.style.borderLeftColor = "#d1d5db";
            }

            const clubResults = relayResults.filter(row => cleanClubName(row.club) === formalClubName);

            if (clubResults.length > 0) {
                let totalWins = 0;
                let totalPodiums = 0;
                const runnerStats = {};

                clubResults.forEach(row => {
                    const cleanName = row.name.replace(/\s*\([MF]\d*\)\s*$/i, '').trim();
                    if (row.position === 1) totalWins++;
                    if (row.position <= 3) totalPodiums++;

                    if (!runnerStats[cleanName]) {
                        runnerStats[cleanName] = { 
                            name: cleanName, 
                            runs: 0, 
                            wins: 0, 
                            stages: new Set(),
                            winDetails: []
                        };
                    }
                    runnerStats[cleanName].runs++;
                    if (row.position === 1) {
                        runnerStats[cleanName].wins++;
                        runnerStats[cleanName].winDetails.push(`${row.year} Stage ${row.stage}`);
                    }
                    if (row.stage) runnerStats[cleanName].stages.add(parseInt(row.stage));
                });

                const loyaltyList = Object.values(runnerStats).sort((a, b) => b.runs - a.runs || b.stages.size - a.stages.size);
                const winnersList = Object.values(runnerStats).filter(r => r.wins > 0).sort((a, b) => b.wins - a.wins || b.runs - a.runs);

                const uniqueCount = Object.keys(runnerStats).length;
                document.getElementById('clubMeta').textContent = `Documented historical tracking features ${uniqueCount} unique club athletes across ${clubResults.length} individual stage appearances.`;
                
                document.getElementById('statTotalRaces').textContent = clubResults.length;
                document.getElementById('statUniqueRunners').textContent = uniqueCount;
                document.getElementById('statClubWins').textContent = totalWins;
                document.getElementById('statClubPodiums').textContent = totalPodiums;

                // Render Loyalty Matrix
                let loyaltyHtml = '';
                loyaltyList.forEach((runner, idx) => {
                    let gridHtml = '<div class="completion-grid">';
                    for (let s = 1; s <= 14; s++) {
                        const hasRun = runner.stages.has(s);
                        gridHtml += `<div class="stage-box ${hasRun ? 'completed' : ''}">${s}</div>`;
                    }
                    gridHtml += '</div>';

                    loyaltyHtml += `
                        <div class="leaderboard-row">
                            <div class="font-bold">${idx + 1}</div>
                            <div><a href="athlete.html?name=${encodeURIComponent(runner.name)}">${runner.name}</a></div>
                            <div>
                                <span class="font-bold" style="display:inline-block; width:40px;">${runner.runs}</span> 
                                ${gridHtml}
                            </div>
                        </div>`;
                });
                document.getElementById('loyaltyContainer').innerHTML = loyaltyHtml;

                // Render Winners Circle
                let winnersHtml = '';
                if (winnersList.length > 0) {
                    winnersList.forEach((runner, idx) => {
                        const breakdownText = runner.winDetails.join(', ');
                        
                        winnersHtml += `
                            <div class="leaderboard-row">
                                <div class="font-bold">${idx + 1}</div>
                                <div><a href="athlete.html?name=${encodeURIComponent(runner.name)}">${runner.name}</a></div>
                                <div class="text-right">
                                    <span class="font-bold" style="color: ${activeColor === '#ffffff' ? '#111827' : activeColor}; font-size:1.1rem; vertical-align:middle;">
                                        ${runner.wins} ${runner.wins === 1 ? 'Win' : 'Wins'}
                                    </span>
                                    <span class="win-history-tag">${breakdownText}</span>
                                </div>
                            </div>`;
                    });
                } else {
                    winnersHtml = '<div style="padding: 20px; text-align: center; color: #6b7280;">No individual stage victories tracked in the archive for this club.</div>';
                }
                document.getElementById('winnersContainer').innerHTML = winnersHtml;

            } else {
                document.getElementById('clubMeta').textContent = "No data records found matching this club configuration key.";
            }
        }
    </script>
</body>
</html>
